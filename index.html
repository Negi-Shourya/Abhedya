<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABHEDYA | ISTE NITH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--dark-bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed; top: 0; left: 0; z-index: 1;
        }

        /* Responsive Layout Container */
        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100%;
            padding: 20px; box-sizing: border-box;
        }

        /* Branding Section */
        .branding {
            text-align: center; margin-bottom: 40px;
        }

        .iste-logo {
            width: 60px; height: auto; margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0; letter-spacing: 12px;
            text-transform: uppercase; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            letter-spacing: 4px; color: var(--primary-red);
            font-weight: 600; text-transform: uppercase;
        }

        /* Form Card */
        .register-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px 30px; border-radius: 24px;
            width: 100%; max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px; border-radius: 12px;
            color: white; font-size: 1.1rem;
            margin-top: 20px; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--primary-red); background: rgba(0,0,0,0.5); }

        button {
            width: 100%; margin-top: 20px; padding: 15px;
            background: var(--primary-red); color: white;
            border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer;
            font-size: 1rem; text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #ff0000; transform: translateY(-2px); }

        /* Prank Page (Hidden) */
        #prank-page {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .prank-overlay-text {
            position: absolute; top: 10%; z-index: 1001;
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: 900; color: white;
            text-shadow: 0 0 20px var(--primary-red);
            pointer-events: none;
        }

        /* Video Container to force fullscreen feel */
        .video-wrapper {
            width: 100vw; height: 100vh;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="registration-page" class="main-wrapper">
        <div class="branding">
            <img src="https://iste.nith.ac.in/assets/img/logo.png" alt="ISTE Logo" class="iste-logo">
            <h1>ABHEDYA</h1>
            <div class="subtitle">By ISTE NITH</div>
        </div>

        <div class="register-card" id="form-ui">
            <p style="margin: 0; opacity: 0.6; font-size: 0.9rem;">Event Registration Phase 1</p>
            <input type="text" id="rollNo" placeholder="Enter Roll Number" autocomplete="off">
            <button onclick="handleRegister()">Proceed to Register</button>
        </div>
    </div>

    <div id="prank-page">
        <div class="prank-overlay-text">APRIL FOOL! 🤡</div>
        <div id="video-injection" class="video-wrapper"></div>
    </div>

    <script>
        // --- 1. PRO THREE.JS BACKGROUND ---
        let scene, camera, renderer, starGeo, stars;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            starGeo = new THREE.Geometry();
            for(let i=0; i<6000; i++) {
                let star = new THREE.Vector3(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
                star.velocity = 0;
                star.acceleration = 0.01;
                starGeo.vertices.push(star);
            }

            let sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
            let starMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.7, map: sprite, transparent: true });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);
            animate();
        }

        function animate() {
            starGeo.vertices.forEach(p => {
                p.velocity += p.acceleration;
                p.y -= p.velocity;
                if (p.y < -200) { p.y = 200; p.velocity = 0; }
            });
            starGeo.verticesNeedUpdate = true;
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // --- 2. THE HANDLER ---
        function handleRegister() {
            const roll = document.getElementById('rollNo').value;
            if(!roll) { alert("Please enter your Roll Number!"); return; }

            // High-speed Warp effect
            starGeo.vertices.forEach(p => p.acceleration = 0.9);

            // Animate form out
            gsap.to("#registration-page", {
                duration: 0.6,
                scale: 0.8,
                opacity: 0,
                ease: "power2.in",
                onComplete: () => {
                    document.getElementById('registration-page').style.display = 'none';
                    triggerPrank();
                }
            });
        }

        function triggerPrank() {
            const prankPage = document.getElementById('prank-page');
            prankPage.style.display = 'flex';

            // Forced Autoplay Injection
            // Using ?autoplay=1&mute=0 and allow="autoplay"
            document.getElementById('video-injection').innerHTML = `
                <iframe 
                    width="100%" height="100%" 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&mute=0&rel=0&showinfo=0" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen
                    style="width:100vw; height:100vh;">
                </iframe>
            `;

            gsap.from(".prank-overlay-text", { duration: 1, scale: 0, ease: "elastic.out(1, 0.3)" });
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
    </script>
</body>
</html>
